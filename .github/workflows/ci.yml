name: eFiche AI CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-tests:
    name: Backend Pytest
    runs-on: ubuntu-latest
    
    # Run a postgres and redis container alongside the job to allow full integration tests
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: your_postgres_user
          POSTGRES_PASSWORD: your_postgres_password
          POSTGRES_DB: efiche_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
      redis:
        image: redis:alpine
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install backend dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        
    - name: Prepare Environment Variables
      run: cp .env.example .env

    - name: Run Backend Tests
      env:
        DATABASE_URL: postgresql://your_postgres_user:your_postgres_password@localhost:5432/efiche_db
      run: |
        cd backend
        PYTHONPATH=. python -m pytest tests/ -v
        
  frontend-tests:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci
        
    - name: Run Next.js Linter
      run: |
        cd frontend
        npm run lint
        
    - name: Test Next.js Production Build
      run: |
        cd frontend
        npm run build
